name: Build and Publish Firmware

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install platformio

      - run: pio run

      - name: Stage OTA files
        run: |
          mkdir -p ota
          cp .pio/build/m5stack-c/firmware.bin ota/firmware.bin
          echo "${GITHUB_REF_NAME#v}" > ota/version.txt

      - name: Commit + push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ota/firmware.bin ota/version.txt
          git commit -m "Release ${GITHUB_REF_NAME}" || echo "No changes"
          git push origin HEAD:main
