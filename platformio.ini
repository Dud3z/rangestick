; PlatformIO project configuration for the M5StickC Plus2
; "SG Pulse Pro" clone: shot timer, anti-cant level, stability tracker, DOPE card

[env:m5stack-c]
platform = espressif32
board = m5stick-c
board_build.partitions = partitions_ota.csv
framework = arduino
monitor_speed = 115200
upload_speed = 1500000
build_flags =
    -DCORE_DEBUG_LEVEL=0
lib_deps =
    m5stack/M5Unified
    m5stack/M5GFX
    kosme/arduinoFFT @ ^2.0.0
